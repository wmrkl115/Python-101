<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJC Academy — IT Class: Coding</title>
<style>
  :root {
    --bg: #f2f5f2;
    --card: #ffffff;
    --text: #13141f;
    --muted: #5b6d5f;
    --accent: #1a7a3a;
    --accent-dark: #0f5c28;
    --accent-light: #e8f5ed;
    --danger: #d43535;
    --danger-bg: #fff5f5;
    --danger-border: #fccfcf;
    --func-bg: #edf7f0;
    --func-border: #b8dcc8;
    --radius: 14px;
    --shadow-card: 0 2px 8px rgba(0,0,0,.05), 0 8px 32px rgba(0,0,0,.055);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    padding: 2.5rem 1.5rem 3rem;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 860px; margin: 0 auto; }

  /* ── HEADER ── */
  header { text-align:center; margin-bottom:2.5rem; }
  .header-logo { display:block; max-width:100px; height:auto; margin:0 auto .9rem; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.07); }
  header h1 { font-size:2.2rem; font-weight:800; letter-spacing:-.02em; margin-bottom:.35rem; }
  header h1 span { color:var(--accent); }
  header p { color:var(--muted); font-size:1rem; font-weight:500; }

  /* ── HOME: day buttons ── */
  .home-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem; margin-top:1.5rem; }
  @media(max-width:640px){ .home-grid{grid-template-columns:1fr;} }
  .day-btn {
    display:block; background:var(--card); border-radius:var(--radius); padding:2.2rem 1.5rem; text-align:center;
    text-decoration:none; color:var(--text); box-shadow:var(--shadow-card); border-top:5px solid var(--accent);
    transition: transform .15s, box-shadow .15s; cursor:pointer;
  }
  .day-btn:hover { transform:translateY(-3px); box-shadow:0 4px 16px rgba(0,0,0,.1); }
  .day-btn .num { font-size:3rem; font-weight:800; color:var(--accent); display:block; line-height:1; }
  .day-btn .label { font-size:1.05rem; font-weight:700; margin:.35rem 0 .2rem; }
  .day-btn .sub { font-size:.82rem; color:var(--muted); }
  .day-btn:nth-child(2){ border-top-color:#2a8c4a; } .day-btn:nth-child(2) .num{ color:#2a8c4a; }
  .day-btn:nth-child(3){ border-top-color:#3aa86b; } .day-btn:nth-child(3) .num{ color:#3aa86b; }

  .cheat-link { display:block; text-align:center; margin-top:2rem; color:var(--accent); font-weight:700; font-size:1rem; cursor:pointer; }

  /* ── PAGE SYSTEM ── */
  .view { display:none; }
  .view.active { display:block; }

  /* ── TOP NAV BAR ── */
  .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.8rem; flex-wrap:wrap; gap:.75rem; }
  .topbar .back { color:var(--accent); font-weight:700; font-size:.95rem; cursor:pointer; border:none; background:none; }
  .topbar .day-title { font-size:1.2rem; font-weight:750; text-align:center; flex:1; min-width:200px; }

  /* page dots */
  .page-dots { display:flex; gap:.45rem; justify-content:center; align-items:center; margin-bottom:1.8rem; flex-wrap:wrap; }
  .page-dots .dot {
    width:32px; height:32px; border-radius:50%; border:2px solid #c2d8c9; background:#fff; cursor:pointer;
    font-size:.78rem; font-weight:700; color:var(--muted); display:flex; align-items:center; justify-content:center;
    transition: all .15s;
  }
  .page-dots .dot.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .page-dots .dot:hover:not(.active) { border-color:var(--accent); }

  /* ── PAGE CARD ── */
  .page-card {
    background:var(--card); border-radius:var(--radius); padding:2.2rem 2.5rem; margin-bottom:1.5rem;
    box-shadow:var(--shadow-card); border-top:5px solid var(--accent);
    border-left:1px solid #eef0f5; border-right:1px solid #eef0f5; border-bottom:1px solid #eef0f5;
  }
  .page-card h2 { font-size:1.4rem; font-weight:750; margin-bottom:.8rem; }
  .page-card h3 { font-size:1.05rem; font-weight:700; color:var(--accent-dark); margin:1.2rem 0 .4rem; }

  /* ── BOTTOM NAV ── */
  .botnav { display:flex; justify-content:space-between; align-items:center; margin-top:.8rem; }
  .botnav button {
    padding:.65rem 1.4rem; border-radius:99px; font-size:.9rem; font-weight:700; cursor:pointer; border:none;
    transition: all .15s;
  }
  .btn-prev { background:#eef2ee; color:var(--text); }
  .btn-prev:hover:not(:disabled) { background:#dde5de; }
  .btn-next { background:var(--accent); color:#fff; }
  .btn-next:hover:not(:disabled) { background:var(--accent-dark); }
  .botnav button:disabled { opacity:.35; cursor:default; }

  /* ── FUNC BOX ── */
  .func-box {
    background:var(--func-bg); border:1px solid var(--func-border); border-radius:var(--radius);
    padding:1.3rem 1.5rem; margin:1.2rem 0;
  }
  .func-box h4 { font-size:1.05rem; font-weight:700; color:var(--accent-dark); margin-bottom:.5rem; }
  .func-box h4 code { font-size:1.1rem; background:#c5e0cf; padding:.1rem .35rem; border-radius:5px; color:var(--accent-dark); }
  .func-box p { font-size:.93rem; margin-top:.5rem; }
  .func-box table { width:100%; border-collapse:collapse; margin-top:.5rem; font-size:.91rem; }
  .func-box th { text-align:left; background:#d2ebd9; padding:.55rem .75rem; font-size:.77rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--accent-dark); }
  .func-box td { padding:.55rem .75rem; border-bottom:1px solid var(--func-border); vertical-align:top; }
  .func-box tr:last-child td { border-bottom:none; }
  .func-box td:first-child { font-family:'SF Mono','Fira Code','Cascadia Code',monospace; font-weight:600; font-size:.87rem; white-space:nowrap; }

  /* ── CAUTIONS ── */
  .cautions {
    background:var(--danger-bg); border:1px solid var(--danger-border); border-left:5px solid var(--danger);
    border-radius:var(--radius); padding:1.3rem 1.5rem; margin:1.2rem 0;
  }
  .cautions h4 { color:var(--danger); font-size:1rem; font-weight:700; margin-bottom:.6rem; }
  .cautions>ul{list-style:none;padding:0;}
  .cautions>ul>li{padding:.5rem 0 .5rem 1.5rem;text-indent:-1.5rem;font-size:.92rem;border-bottom:1px solid #fde2e2;}
  .cautions>ul>li:last-child{border-bottom:none;}
  .cautions>ul>li::before{content:"🚫  ";}

  /* ── CODE ── */
  pre {
    background:#191a24; color:#e2e2f2; font-family:'SF Mono','Fira Code','Cascadia Code',monospace;
    font-size:.9rem; padding:1.1rem 1.3rem; border-radius:10px; overflow-x:auto; margin:.8rem 0;
    line-height:1.7; box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  }
  .kw{color:#f08c5a;font-weight:600;} .bf{color:#f0c05a;font-weight:600;}
  .str{color:#7bd88f;} .cmt{color:#6c6f85;font-style:italic;} .op{color:#c792ea;} .num{color:#f0c05a;}

  /* ── EXERCISE ── */
  .exercise {
    background:#f0faf3; border:1px solid #9ddbb5; border-left:5px solid #1a6b36;
    border-radius:var(--radius); padding:1.3rem 1.5rem; margin:1.4rem 0 .5rem;
  }
  .exercise h4 { color:#1a6b36; font-size:1rem; font-weight:700; margin-bottom:.4rem; }
  .exercise p { font-size:.93rem; line-height:1.75; }

  .tag { display:inline-block; background:#c5e0cf; color:var(--accent-dark); font-size:.7rem; font-weight:700; padding:.15rem .65rem; border-radius:99px; margin-left:.35rem; vertical-align:middle; letter-spacing:.04em; text-transform:uppercase; }
  hr { border:0; height:1px; background:linear-gradient(to right,transparent,#c2d8c9,transparent); margin:1.6rem 0; }
  :not(pre)>code { background:#e2efe6; color:#1a4a2a; padding:.12rem .4rem; border-radius:5px; font-size:.87em; font-weight:550; white-space:nowrap; }
  .cautions :not(pre)>code,.func-box :not(pre)>code{background:rgba(0,0,0,.06);}
  footer { text-align:center; color:var(--muted); font-size:.8rem; margin-top:2.5rem; opacity:.6; }
  .cheat-table { width:100%; border-collapse:collapse; font-size:.91rem; }
  .cheat-table th { text-align:left; background:#c5e0cf; padding:.6rem .75rem; font-size:.76rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--accent-dark); }
  .cheat-table td { padding:.6rem .75rem; border-bottom:1px solid #d2e8da; vertical-align:top; }
  .cheat-table td:first-child{font-family:monospace;font-weight:600;}
  .cheat-table tr:last-child td{border-bottom:none;}
  @media(max-width:640px){ body{padding:1.5rem .75rem 2rem;} .page-card{padding:1.4rem 1.2rem;} .func-box,.cautions,.exercise{padding:1rem 1.1rem;} .func-box td:first-child{white-space:normal;} header h1{font-size:1.6rem;} }
</style>
</head>

// ═══════════════════════════ STATE ═══════════════════════════
let currentDay = null;
let currentPage = 0;

function goHome() {
  currentDay = null;
  currentPage = 0;
  document.getElementById('home').classList.add('active');
  document.getElementById('day-container').classList.remove('active');
}

function openDay(n) {
  currentDay = n;
  currentPage = 0;
  document.getElementById('home').classList.remove('active');
  document.getElementById('day-container').classList.add('active');
  renderDay();
}

function prevPage() {
  if (currentPage > 0) { currentPage--; renderDay(); }
}

function nextPage() {
  const max = days[currentDay].pages.length - 1;
  if (currentPage < max) { currentPage++; renderDay(); }
}

function goPage(i) {
  currentPage = i;
  renderDay();
}

function renderDay() {
  const d = days[currentDay];
  document.getElementById('day-title').textContent = d.title;

  // page dots
  const dotsEl = document.getElementById('page-dots');
  dotsEl.innerHTML = d.pages.map((p, i) =>
    `<div class="dot${i === currentPage ? ' active' : ''}" onclick="goPage(${i})">${i + 1}</div>`
  ).join('');

  // content
  document.getElementById('page-content').innerHTML =
    `<div class="page-card"><h2>${d.pages[currentPage].title}</h2>${d.pages[currentPage].html}</div>`;

  // label
  document.getElementById('page-num-label').textContent =
    `Page ${currentPage + 1} of ${d.pages.length}`;

  // buttons
  document.getElementById('btn-prev').disabled = currentPage === 0;
  document.getElementById('btn-next').disabled = currentPage === d.pages.length - 1;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

</body>
</html>
